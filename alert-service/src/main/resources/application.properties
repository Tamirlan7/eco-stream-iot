spring.application.name=alert-service
server.port=8084

spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=alert-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=com.tami.usageservice.kafka.event.AlertingEvent:com.tami.alertservice.kafka.event.AlertingEvent

spring.datasource.url=jdbc:postgresql://localhost:5433/db
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# MailPit configuration
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
