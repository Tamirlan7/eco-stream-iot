spring.application.name=usage-service
server.port=8083

#Kafka
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=usage-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=com.tami.ingestionservice.kafka.event.EnergyUsageEvent:com.tami.usageservice.kafka.event.EnergyUsageEvent

# This tells the usage-service:
# "It is okay to deserialize objects that belong to the ingestion-service's package"
spring.kafka.consumer.properties.spring.json.trusted.packages=com.tami.usageservice.kafka.event,com.tami.ingestionservice.kafka.event

#Kafka - producer
spring.kafka.template.default-topic=energy-alerts
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

influx.url=http://localhost:8087
influx.token=my-token
influx.org=com.tami
influx.bucket=usage-bucket


device.service.url=http://localhost:8081/api/v1/device
user.service.url=http://localhost:8080/api/v1/user
